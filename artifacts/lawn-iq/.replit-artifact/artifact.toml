kind = "web"
previewPath = "/"
title = "LawnIQ AI"
version = "1.0.0"
id = "artifacts/lawn-iq"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19956

[services.development]
run = "pnpm --filter @workspace/lawn-iq run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/lawn-iq", "run", "build" ]
publicDir = "artifacts/lawn-iq/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19956"
BASE_PATH = "/"
