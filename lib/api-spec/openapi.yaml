openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: LawnIQ API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: diagnoses
    description: Lawn diagnosis operations
  - name: Auth
    description: Browser and mobile authentication endpoints.
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /diagnoses:
    get:
      operationId: listDiagnoses
      tags: [diagnoses]
      summary: List saved diagnoses
      description: Returns all saved lawn diagnoses, newest first
      responses:
        "200":
          description: A list of diagnoses
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Diagnosis"
    post:
      operationId: analyzeLawn
      tags: [diagnoses]
      summary: Analyze a lawn photo
      description: Sends the lawn photo and details to the AI vision model and returns a diagnosis. Does not persist by default.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnalyzeLawnBody"
      responses:
        "200":
          description: Diagnosis result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Diagnosis"
  /diagnoses/{id}:
    get:
      operationId: getDiagnosis
      tags: [diagnoses]
      summary: Get a saved diagnosis by id
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: A single diagnosis
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Diagnosis"
        "404":
          description: Not found
    delete:
      operationId: deleteDiagnosis
      tags: [diagnoses]
      summary: Delete a saved diagnosis
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted
  /diagnoses/save:
    post:
      operationId: saveDiagnosis
      tags: [diagnoses]
      summary: Save a diagnosis to the recovery plan log
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SaveDiagnosisBody"
      responses:
        "200":
          description: Saved diagnosis
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Diagnosis"
  /diagnoses/summary:
    get:
      operationId: getDiagnosesSummary
      tags: [diagnoses]
      summary: Aggregate summary of saved diagnoses
      description: Counts, average health score, and severity breakdown across saved diagnoses
      responses:
        "200":
          description: Summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DiagnosesSummary"
  /diagnoses/usage:
    get:
      operationId: getDiagnosisUsage
      tags: [diagnoses]
      summary: Get the current user's AI analysis usage
      responses:
        "200":
          description: Usage info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DiagnosisUsage"
  /upgrade-request:
    post:
      operationId: createUpgradeRequest
      tags: [diagnoses]
      summary: Submit a request for more free AI analyses
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpgradeRequestBody"
      responses:
        "200":
          description: Request submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpgradeRequestStatus"
    get:
      operationId: getUpgradeRequest
      tags: [diagnoses]
      summary: Get the current user's upgrade request status
      responses:
        "200":
          description: Current upgrade request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpgradeRequestStatus"
  /auth/user:
    get:
      tags: [Auth]
      operationId: getCurrentAuthUser
      summary: Get the currently authenticated user
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '200':
          description: Auth status resolved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthUserEnvelope'
  /login:
    get:
      tags: [Auth]
      operationId: beginBrowserLogin
      summary: Start the browser OIDC login flow
      parameters:
        - name: returnTo
          in: query
          required: false
          description: Relative path to redirect to after login (must start with `/`). Defaults to `/`.
          schema:
            type: string
      responses:
        '302':
          description: Redirect to the OIDC authorization endpoint.
  /callback:
    get:
      tags: [Auth]
      operationId: handleBrowserLoginCallback
      summary: Complete the browser OIDC login flow
      parameters:
        - name: code
          in: query
          required: false
          schema:
            type: string
        - name: state
          in: query
          required: false
          schema:
            type: string
        - name: iss
          in: query
          required: false
          schema:
            type: string
            format: uri
      responses:
        '302':
          description: Redirect to the `returnTo` path on success (defaults to `/`) or `/api/login` on failure.
  /logout:
    get:
      tags: [Auth]
      operationId: logoutBrowserSession
      summary: Clear the session and begin OIDC logout
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '302':
          description: Redirect to the OIDC provider logout URL.
  /mobile-auth/token-exchange:
    post:
      tags: [Auth]
      operationId: exchangeMobileAuthorizationCode
      summary: Exchange a mobile OIDC code for a session token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MobileTokenExchangeRequest'
      responses:
        '200':
          description: Session created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MobileTokenExchangeSuccess'
        '400':
          description: Missing or invalid required fields.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Token did not contain usable claims.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Token exchange failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /mobile-auth/logout:
    post:
      tags: [Auth]
      operationId: logoutMobileSession
      summary: Delete a mobile session token
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
      responses:
        '200':
          description: Logout processed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogoutSuccess'
components:
  parameters:
    AuthorizationSessionHeader:
      name: Authorization
      in: header
      required: false
      description: Opaque session token — `Bearer <sid>`.
      schema:
        type: string
    SessionCookie:
      name: sid
      in: cookie
      required: false
      description: Browser session cookie.
      schema:
        type: string
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    Severity:
      type: string
      enum: [Low, Medium, High]
    GrassType:
      type: string
      enum:
        - Unknown
        - Tall Fescue
        - Bermuda
        - Zoysia
        - Kentucky Bluegrass
        - St. Augustine
        - Ryegrass
        - Centipede
    IssueAppearance:
      type: string
      enum:
        - Yellow grass
        - Brown patches
        - Dry or crispy
        - Weeds
        - Thin / bare spots
        - Mossy / damp
        - Looks healthy
    AnalyzeLawnBody:
      type: object
      required:
        - photoDataUrl
        - issueAppearance
        - grassType
      properties:
        photoDataUrl:
          type: string
          description: Base64 data URL of the lawn photo
        issueAppearance:
          $ref: "#/components/schemas/IssueAppearance"
        grassType:
          $ref: "#/components/schemas/GrassType"
        description:
          type: string
          description: Free-form description from the user
        location:
          type: string
          description: Optional region or climate context
    DiagnosisStep:
      type: object
      required:
        - title
        - detail
      properties:
        title:
          type: string
        detail:
          type: string
        timing:
          type: string
          description: When to do this step (e.g. "This week", "Next 2 weeks")
        priority:
          type: string
          enum: [immediate, soon, ongoing]
          description: Urgency level for this step
    TreatmentProduct:
      type: object
      required:
        - type
        - description
      properties:
        type:
          type: string
          description: Product category (e.g. "Systemic fungicide", "Slow-release nitrogen", "Pre-emergent herbicide")
        description:
          type: string
          description: What to look for and how to apply it
        caution:
          type: string
          description: Safety or timing caution if relevant
    Diagnosis:
      type: object
      required:
        - id
        - title
        - severity
        - healthScore
        - confidence
        - summary
        - steps
        - waterAdvice
        - lightAdvice
        - riskAdvice
        - createdAt
      properties:
        id:
          type: string
        title:
          type: string
        severity:
          $ref: "#/components/schemas/Severity"
        healthScore:
          type: integer
          minimum: 0
          maximum: 100
        confidence:
          type: integer
          minimum: 0
          maximum: 100
        summary:
          type: string
        causativeAgent:
          type: string
          description: Specific pathogen, pest, or abiotic factor identified (e.g. "Rhizoctonia solani")
        estimatedRecovery:
          type: string
          description: Recovery timeline with treatment (e.g. "3–5 weeks with consistent care")
        soilAdvice:
          type: string
          description: Soil health, pH, or aeration recommendation
        seasonalNote:
          type: string
          description: Season-specific context for this diagnosis
        differentialNote:
          type: string
          description: Other conditions considered and ruled out
        preventionTips:
          type: array
          items:
            type: string
          description: Tips to prevent recurrence
        treatmentProducts:
          type: array
          items:
            $ref: "#/components/schemas/TreatmentProduct"
          description: Product types recommended for treatment
        steps:
          type: array
          items:
            $ref: "#/components/schemas/DiagnosisStep"
        waterAdvice:
          type: string
        lightAdvice:
          type: string
        riskAdvice:
          type: string
        grassType:
          $ref: "#/components/schemas/GrassType"
        issueAppearance:
          $ref: "#/components/schemas/IssueAppearance"
        description:
          type: string
        photoDataUrl:
          type: string
        createdAt:
          type: string
          format: date-time
    SaveDiagnosisBody:
      type: object
      required:
        - diagnosis
      properties:
        diagnosis:
          $ref: "#/components/schemas/Diagnosis"
        nickname:
          type: string
          description: Optional friendly nickname for the saved plan
    DiagnosisUsage:
      type: object
      required: [used, limit, remaining]
      properties:
        used:
          type: integer
        limit:
          type: integer
        remaining:
          type: integer
    DiagnosesSummary:
      type: object
      required:
        - totalSaved
        - averageHealthScore
        - severityCounts
        - latestSavedAt
      properties:
        totalSaved:
          type: integer
        averageHealthScore:
          type: integer
        severityCounts:
          type: object
          required: [Low, Medium, High]
          properties:
            Low:
              type: integer
            Medium:
              type: integer
            High:
              type: integer
        latestSavedAt:
          type: string
          format: date-time
          nullable: true
        topIssue:
          type: string
          nullable: true
    AuthUser:
      type: object
      required: [id, email, firstName, lastName, profileImageUrl]
      properties:
        id:
          type: string
        email:
          type: [string, 'null']
          format: email
        firstName:
          type: [string, 'null']
        lastName:
          type: [string, 'null']
        profileImageUrl:
          type: [string, 'null']
    AuthUserEnvelope:
      type: object
      required: [user]
      properties:
        user:
          oneOf:
            - $ref: '#/components/schemas/AuthUser'
            - type: 'null'
    MobileTokenExchangeRequest:
      type: object
      required: [code, code_verifier, redirect_uri, state]
      properties:
        code:
          type: string
          minLength: 1
        code_verifier:
          type: string
          minLength: 1
        redirect_uri:
          type: string
          minLength: 1
          format: uri
        state:
          type: string
          minLength: 1
        nonce:
          type: string
          minLength: 1
    MobileTokenExchangeSuccess:
      type: object
      required: [token]
      properties:
        token:
          type: string
    LogoutSuccess:
      type: object
      required: [success]
      properties:
        success:
          type: boolean
          const: true
    UpgradeRequestBody:
      type: object
      required: [message]
      properties:
        message:
          type: string
          maxLength: 1000
    UpgradeRequestStatus:
      type: object
      required: [submitted, status]
      properties:
        submitted:
          type: boolean
        status:
          type: string
          enum: [pending, fulfilled]
          nullable: true
        message:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
          nullable: true
    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: string
