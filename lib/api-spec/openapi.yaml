openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: LawnIQ API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: diagnoses
    description: Lawn diagnosis operations
  - name: community
    description: Community posts and comments
  - name: Auth
    description: Browser and mobile authentication endpoints.
  - name: leads
    description: Homeowner lead capture and management
  - name: pro
    description: Professional partner portal endpoints
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /diagnoses:
    get:
      operationId: listDiagnoses
      tags: [diagnoses]
      summary: List saved diagnoses
      description: Returns all saved lawn diagnoses, newest first
      responses:
        "200":
          description: A list of diagnoses
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Diagnosis"
    post:
      operationId: analyzeLawn
      tags: [diagnoses]
      summary: Analyze a lawn photo
      description: Sends the lawn photo and details to the AI vision model and returns a diagnosis. Does not persist by default.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnalyzeLawnBody"
      responses:
        "200":
          description: Diagnosis result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Diagnosis"
  /diagnoses/{id}:
    get:
      operationId: getDiagnosis
      tags: [diagnoses]
      summary: Get a saved diagnosis by id
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: A single diagnosis
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Diagnosis"
        "404":
          description: Not found
    delete:
      operationId: deleteDiagnosis
      tags: [diagnoses]
      summary: Delete a saved diagnosis
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted
  /diagnoses/save:
    post:
      operationId: saveDiagnosis
      tags: [diagnoses]
      summary: Save a diagnosis to the recovery plan log
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SaveDiagnosisBody"
      responses:
        "200":
          description: Saved diagnosis
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Diagnosis"
  /diagnoses/summary:
    get:
      operationId: getDiagnosesSummary
      tags: [diagnoses]
      summary: Aggregate summary of saved diagnoses
      description: Counts, average health score, and severity breakdown across saved diagnoses
      responses:
        "200":
          description: Summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DiagnosesSummary"
  /diagnoses/usage:
    get:
      operationId: getDiagnosisUsage
      tags: [diagnoses]
      summary: Get the current user's AI analysis usage
      responses:
        "200":
          description: Usage info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DiagnosisUsage"
  /upgrade-request:
    post:
      operationId: createUpgradeRequest
      tags: [diagnoses]
      summary: Submit a request for more free AI analyses
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpgradeRequestBody"
      responses:
        "200":
          description: Request submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpgradeRequestStatus"
    get:
      operationId: getUpgradeRequest
      tags: [diagnoses]
      summary: Get the current user's upgrade request status
      responses:
        "200":
          description: Current upgrade request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpgradeRequestStatus"
  /community:
    get:
      operationId: listCommunityPosts
      tags: [community]
      summary: List community posts newest first
      responses:
        "200":
          description: Array of posts with comment counts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CommunityPost"
    post:
      operationId: createCommunityPost
      tags: [community]
      summary: Create a community post
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCommunityPostBody"
      responses:
        "201":
          description: Created post
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommunityPost"
  /community/{id}:
    delete:
      operationId: deleteCommunityPost
      tags: [community]
      summary: Delete own community post
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted
  /community/{id}/comments:
    get:
      operationId: listCommunityComments
      tags: [community]
      summary: List comments on a post
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Array of comments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CommunityComment"
    post:
      operationId: createCommunityComment
      tags: [community]
      summary: Add a comment to a post
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCommunityCommentBody"
      responses:
        "201":
          description: Created comment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommunityComment"
  /community/comments/{commentId}:
    delete:
      operationId: deleteCommunityComment
      tags: [community]
      summary: Delete own comment
      parameters:
        - in: path
          name: commentId
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted
  /user/profile:
    get:
      tags: [user]
      operationId: getUserProfile
      summary: Get the current user's profile (display name, yard size)
      responses:
        "200":
          description: Profile fetched
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
        "401":
          description: Unauthorized
    put:
      tags: [user]
      operationId: updateUserProfile
      summary: Update the current user's profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserProfileBody'
      responses:
        "200":
          description: Profile updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
        "400":
          description: Invalid data
        "401":
          description: Unauthorized
  /treatments:
    get:
      tags: [treatments]
      operationId: listTreatmentLogs
      summary: List the current user's logged treatments
      responses:
        "200":
          description: List of treatment logs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TreatmentLog'
        "401":
          description: Unauthorized
    post:
      tags: [treatments]
      operationId: logTreatment
      summary: Log a completed treatment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LogTreatmentBody'
      responses:
        "201":
          description: Treatment logged
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TreatmentLog'
        "400":
          description: Invalid request
        "401":
          description: Unauthorized
  /treatments/{id}:
    delete:
      tags: [treatments]
      operationId: deleteTreatmentLog
      summary: Remove a treatment log entry
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted
        "401":
          description: Unauthorized
  /journal:
    get:
      tags: [journal]
      operationId: listJournalEntries
      summary: List the current user's lawn journal entries
      responses:
        "200":
          description: List of journal entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/LawnNote'
        "401":
          description: Unauthorized
    post:
      tags: [journal]
      operationId: createJournalEntry
      summary: Create a new journal entry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateLawnNoteBody'
      responses:
        "201":
          description: Entry created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LawnNote'
        "400":
          description: Invalid request
        "401":
          description: Unauthorized
  /journal/{id}:
    put:
      tags: [journal]
      operationId: updateJournalEntry
      summary: Update a journal entry
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateLawnNoteBody'
      responses:
        "200":
          description: Entry updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LawnNote'
        "401":
          description: Unauthorized
        "404":
          description: Not found
    delete:
      tags: [journal]
      operationId: deleteJournalEntry
      summary: Delete a journal entry
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted
        "401":
          description: Unauthorized
  /leads:
    post:
      operationId: captureLead
      tags: [leads]
      summary: Submit a lead request for a local lawn pro
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CaptureLeadBody"
      responses:
        "201":
          description: Lead captured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CaptureLeadResult"
        "400":
          description: Invalid request
        "401":
          description: Unauthorized
    get:
      operationId: listMyLeads
      tags: [leads]
      summary: List the current homeowner's submitted lead requests
      responses:
        "200":
          description: Array of lead summaries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LeadSummary"
        "401":
          description: Unauthorized
  /pro/auth/register:
    post:
      operationId: proRegister
      tags: [pro]
      summary: Register a new professional account (pending approval)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProRegisterBody"
      responses:
        "201":
          description: Registration submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProRegisterResult"
        "400":
          description: Invalid data
        "409":
          description: Email already registered
  /pro/auth/login:
    post:
      operationId: proLogin
      tags: [pro]
      summary: Authenticate a professional and return a session token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProLoginBody"
      responses:
        "200":
          description: Authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProLoginResult"
        "401":
          description: Invalid credentials
        "403":
          description: Account pending approval
  /pro/auth/logout:
    post:
      operationId: proLogout
      tags: [pro]
      summary: End the professional session
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LogoutSuccess"
  /pro/auth/me:
    get:
      operationId: proGetMe
      tags: [pro]
      summary: Get the currently authenticated professional's profile
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
      responses:
        "200":
          description: Professional profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProProfile"
        "401":
          description: Unauthorized
  /pro/leads:
    get:
      operationId: proListLeads
      tags: [pro]
      summary: List all leads assigned to this professional
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
      responses:
        "200":
          description: Array of leads
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProLead"
        "401":
          description: Unauthorized
  /pro/leads/{id}:
    get:
      operationId: proGetLead
      tags: [pro]
      summary: Get a single lead with full details and notes
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Lead detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProLeadDetail"
        "401":
          description: Unauthorized
        "404":
          description: Not found
    patch:
      operationId: proUpdateLeadStatus
      tags: [pro]
      summary: Update the status of a lead
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateLeadStatusBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateLeadStatusResult"
        "401":
          description: Unauthorized
        "404":
          description: Not found
  /pro/leads/{id}/notes:
    post:
      operationId: proAddLeadNote
      tags: [pro]
      summary: Add a note to a lead
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddLeadNoteBody"
      responses:
        "201":
          description: Note added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProLeadNote"
        "401":
          description: Unauthorized
        "404":
          description: Not found
  /pro/profile:
    get:
      operationId: proGetProfile
      tags: [pro]
      summary: Get the authenticated professional's profile
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
      responses:
        "200":
          description: Profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProProfile"
        "401":
          description: Unauthorized
    patch:
      operationId: proUpdateProfile
      tags: [pro]
      summary: Update the professional's profile (service ZIPs, services)
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProProfileBody"
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProProfile"
        "400":
          description: Invalid data
        "401":
          description: Unauthorized
  /auth/user:
    get:
      tags: [Auth]
      operationId: getCurrentAuthUser
      summary: Get the currently authenticated user
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '200':
          description: Auth status resolved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthUserEnvelope'
  /login:
    get:
      tags: [Auth]
      operationId: beginBrowserLogin
      summary: Start the browser OIDC login flow
      parameters:
        - name: returnTo
          in: query
          required: false
          description: Relative path to redirect to after login (must start with `/`). Defaults to `/`.
          schema:
            type: string
      responses:
        '302':
          description: Redirect to the OIDC authorization endpoint.
  /callback:
    get:
      tags: [Auth]
      operationId: handleBrowserLoginCallback
      summary: Complete the browser OIDC login flow
      parameters:
        - name: code
          in: query
          required: false
          schema:
            type: string
        - name: state
          in: query
          required: false
          schema:
            type: string
        - name: iss
          in: query
          required: false
          schema:
            type: string
            format: uri
      responses:
        '302':
          description: Redirect to the `returnTo` path on success (defaults to `/`) or `/api/login` on failure.
  /logout:
    get:
      tags: [Auth]
      operationId: logoutBrowserSession
      summary: Clear the session and begin OIDC logout
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '302':
          description: Redirect to the OIDC provider logout URL.
  /mobile-auth/token-exchange:
    post:
      tags: [Auth]
      operationId: exchangeMobileAuthorizationCode
      summary: Exchange a mobile OIDC code for a session token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MobileTokenExchangeRequest'
      responses:
        '200':
          description: Session created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MobileTokenExchangeSuccess'
        '400':
          description: Missing or invalid required fields.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Token did not contain usable claims.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Token exchange failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /mobile-auth/logout:
    post:
      tags: [Auth]
      operationId: logoutMobileSession
      summary: Delete a mobile session token
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
      responses:
        '200':
          description: Logout processed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogoutSuccess'
components:
  parameters:
    AuthorizationSessionHeader:
      name: Authorization
      in: header
      required: false
      description: Opaque session token — `Bearer <sid>`.
      schema:
        type: string
    SessionCookie:
      name: sid
      in: cookie
      required: false
      description: Browser session cookie.
      schema:
        type: string
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    Severity:
      type: string
      enum: [Low, Medium, High]
    GrassType:
      type: string
      enum:
        - Unknown
        - Tall Fescue
        - Bermuda
        - Zoysia
        - Kentucky Bluegrass
        - St. Augustine
        - Ryegrass
        - Centipede
    IssueAppearance:
      type: string
      enum:
        - Yellow grass
        - Brown patches
        - Dry or crispy
        - Weeds
        - Thin / bare spots
        - Mossy / damp
        - Looks healthy
    AnalyzeLawnBody:
      type: object
      required:
        - photoDataUrl
        - issueAppearance
        - grassType
      properties:
        photoDataUrl:
          type: string
          description: Base64 data URL of the lawn photo
        issueAppearance:
          $ref: "#/components/schemas/IssueAppearance"
        grassType:
          $ref: "#/components/schemas/GrassType"
        description:
          type: string
          description: Free-form description from the user
        location:
          type: string
          description: Optional region or climate context
    DiagnosisStep:
      type: object
      required:
        - title
        - detail
      properties:
        title:
          type: string
        detail:
          type: string
        timing:
          type: string
          description: When to do this step (e.g. "This week", "Next 2 weeks")
        priority:
          type: string
          enum: [immediate, soon, ongoing]
          description: Urgency level for this step
    TreatmentProduct:
      type: object
      required:
        - type
        - description
      properties:
        type:
          type: string
          description: Product category (e.g. "Systemic fungicide", "Slow-release nitrogen", "Pre-emergent herbicide")
        description:
          type: string
          description: What to look for and how to apply it
        caution:
          type: string
          description: Safety or timing caution if relevant
    Diagnosis:
      type: object
      required:
        - id
        - title
        - severity
        - healthScore
        - confidence
        - summary
        - steps
        - waterAdvice
        - lightAdvice
        - riskAdvice
        - createdAt
      properties:
        id:
          type: string
        title:
          type: string
        severity:
          $ref: "#/components/schemas/Severity"
        healthScore:
          type: integer
          minimum: 0
          maximum: 100
        confidence:
          type: integer
          minimum: 0
          maximum: 100
        summary:
          type: string
        causativeAgent:
          type: string
          description: Specific pathogen, pest, or abiotic factor identified (e.g. "Rhizoctonia solani")
        estimatedRecovery:
          type: string
          description: Recovery timeline with treatment (e.g. "3–5 weeks with consistent care")
        soilAdvice:
          type: string
          description: Soil health, pH, or aeration recommendation
        seasonalNote:
          type: string
          description: Season-specific context for this diagnosis
        differentialNote:
          type: string
          description: Other conditions considered and ruled out
        preventionTips:
          type: array
          items:
            type: string
          description: Tips to prevent recurrence
        treatmentProducts:
          type: array
          items:
            $ref: "#/components/schemas/TreatmentProduct"
          description: Product types recommended for treatment
        steps:
          type: array
          items:
            $ref: "#/components/schemas/DiagnosisStep"
        waterAdvice:
          type: string
        lightAdvice:
          type: string
        riskAdvice:
          type: string
        grassType:
          $ref: "#/components/schemas/GrassType"
        issueAppearance:
          $ref: "#/components/schemas/IssueAppearance"
        description:
          type: string
        photoDataUrl:
          type: string
        createdAt:
          type: string
          format: date-time
    SaveDiagnosisBody:
      type: object
      required:
        - diagnosis
      properties:
        diagnosis:
          $ref: "#/components/schemas/Diagnosis"
        nickname:
          type: string
          description: Optional friendly nickname for the saved plan
    DiagnosisUsage:
      type: object
      required: [used, limit, remaining, isPro]
      properties:
        used:
          type: integer
        limit:
          type: integer
        remaining:
          type: integer
        isPro:
          type: boolean
    DiagnosesSummary:
      type: object
      required:
        - totalSaved
        - averageHealthScore
        - severityCounts
        - latestSavedAt
      properties:
        totalSaved:
          type: integer
        averageHealthScore:
          type: integer
        severityCounts:
          type: object
          required: [Low, Medium, High]
          properties:
            Low:
              type: integer
            Medium:
              type: integer
            High:
              type: integer
        latestSavedAt:
          type: string
          format: date-time
          nullable: true
        topIssue:
          type: string
          nullable: true
    CommunityPost:
      type: object
      required:
        - id
        - userId
        - userName
        - caption
        - commentCount
        - likeCount
        - createdAt
      properties:
        id:
          type: string
        userId:
          type: string
        userName:
          type: string
        userAvatar:
          type: string
          nullable: true
        caption:
          type: string
        photoDataUrl:
          type: string
          nullable: true
        commentCount:
          type: integer
        likeCount:
          type: integer
        createdAt:
          type: string
          format: date-time
    CreateCommunityPostBody:
      type: object
      required:
        - caption
      properties:
        caption:
          type: string
          maxLength: 1000
        photoDataUrl:
          type: string
          nullable: true
    CommunityComment:
      type: object
      required:
        - id
        - postId
        - userId
        - userName
